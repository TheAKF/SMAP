name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > /tmp/GoogleService-Info.plist

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy GoogleService-Info.plist into iOS project
        run: |
          PROJ_DIR=$(find ios -name "*.xcodeproj" -maxdepth 2 | head -1 | xargs dirname)
          cp /tmp/GoogleService-Info.plist "$PROJ_DIR/GoogleService-Info.plist"
          echo "Copied to: $PROJ_DIR"

      - name: Patch Podfile — fix Firebase modular headers
        run: |
          python3 << 'PYEOF'
          import re

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          # ── Diagnostic ──────────────────────────────────────────────────────
          print('=== Podfile first 30 lines ===')
          for i, line in enumerate(content.splitlines()[:30], 1):
              print(f'{i:3}: {line}')
          print()

          idx = content.find('use_expo_modules!')
          if idx >= 0:
              end_idx = content.find('\n', idx)
              print(f'use_expo_modules! found at char {idx}')
              print(f'  exact line : {repr(content[idx:end_idx])}')
              print(f'  with prefix: {repr(content[max(0,idx-10):end_idx])}')
          else:
              print('WARNING: use_expo_modules! NOT FOUND in Podfile!')
          print()

          # ── Fix 1: use_modular_headers! globally ────────────────────────────
          if 'use_modular_headers!' not in content:
              m = re.search(r'^platform :ios', content, re.MULTILINE)
              if m:
                  pos = content.index('\n', m.start()) + 1
                  content = content[:pos] + 'use_modular_headers!\n' + content[pos:]
              else:
                  content = 'use_modular_headers!\n' + content
              print('+ Fix 1: added use_modular_headers!')
          else:
              print('= Fix 1: use_modular_headers! already present')

          # ── Fix 2: exclude EXFirebaseCore using direct string position ───────
          # EXFirebaseCore pulls in FirebaseCoreInternal → GoogleUtilities (the broken chain)
          if 'EXFirebaseCore' not in content:
              idx = content.find('use_expo_modules!')
              if idx >= 0:
                  eol = content.find('\n', idx)
                  original_line = content[idx:eol]
                  suffix = original_line[len('use_expo_modules!'):]
                  # Accept empty, whitespace-only, or empty-parens suffix
                  if not suffix.strip() or suffix.strip() == '()':
                      new_line = 'use_expo_modules!(exclude: ["EXFirebaseCore"])'
                      content = content[:idx] + new_line + content[eol:]
                      print(f'+ Fix 2: patched use_expo_modules! → excluded EXFirebaseCore')
                  else:
                      print(f'! Fix 2: unexpected suffix {repr(suffix)} — skipping (Fix 3 will handle it)')
              else:
                  print('! Fix 2: use_expo_modules! not found')
          else:
              print('= Fix 2: EXFirebaseCore already excluded')

          # ── Fix 3: explicit pod overrides (inserted right after use_expo_modules!) ──
          POD_PATCH = (
              "  pod 'GoogleUtilities', :modular_headers => true\n"
              "  pod 'FirebaseCoreInternal', :modular_headers => true\n"
          )
          if "pod 'GoogleUtilities'" not in content:
              idx = content.find('use_expo_modules!')
              if idx >= 0:
                  eol = content.find('\n', idx) + 1   # position right after the newline
                  content = content[:eol] + POD_PATCH + content[eol:]
                  print('+ Fix 3: inserted GoogleUtilities/FirebaseCoreInternal pod overrides')
              else:
                  # Fallback: insert inside first target block
                  content = re.sub(
                      r"(target '[^']+' do\n)",
                      r'\1' + POD_PATCH,
                      content, count=1
                  )
                  print('+ Fix 3: inserted pod overrides inside target block (fallback)')
          else:
              print('= Fix 3: pod overrides already present')

          with open('ios/Podfile', 'w') as f:
              f.write(content)

          print()
          print('=== Key lines after patch ===')
          for i, line in enumerate(content.splitlines(), 1):
              if any(k in line for k in ['modular_headers', 'EXFirebaseCore', 'GoogleUtilities',
                                          'use_expo_modules', 'platform :ios']):
                  print(f'{i:3}: {line}')
          print()
          print('=== Podfile first 50 lines ===')
          for i, line in enumerate(content.splitlines()[:50], 1):
              print(f'{i:3}: {line}')
          PYEOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          echo "Workspace: $WORKSPACE"

          # List all available schemes for debugging
          echo "Available schemes:"
          xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | grep -A 999 "Schemes:" || true

          # Prefer the app scheme (SchoolMap) over pod schemes like EXAV, RNScreens, etc.
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" \
            | xargs -I{} echo "{}" \
            | grep -i "^SchoolMap$" | head -1)

          # Fallback: any scheme with "School" in the name
          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
              | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" \
              | grep -i "School" | head -1 | xargs)
          fi

          # Last resort: first scheme
          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
              | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          fi

          echo "Selected scheme: $SCHEME"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Read ExpoModulesJSI build script (diagnostic)
        run: |
          python3 << 'PYEOF'
          import re

          with open('ios/Pods/Pods.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()

          print("=== All shellScript values mentioning xcframework or ExpoModulesJSI ===\n")
          found = False
          for m in re.finditer(r'shellScript = "((?:[^"\\]|\\.)*)";', content, re.DOTALL):
              raw = m.group(1)
              script = raw.replace('\\n', '\n').replace('\\t', '\t').replace('\\"', '"').replace('\\\\', '\\')
              if 'ExpoModulesJSI' in script or 'xcframework' in script.lower():
                  found = True
                  print("--- SCRIPT ---")
                  print(script[:3000])
                  print()

          if not found:
              print("Not found via shellScript regex, trying name-based search...")
              idx = content.find('Build ExpoModulesJSI xcframework')
              if idx >= 0:
                  print(f"Found name at char {idx}, context:")
                  print(content[max(0,idx-200):idx+1000])
              else:
                  print("Build ExpoModulesJSI xcframework not found in pbxproj at all!")
          PYEOF

      - name: Pre-resolve Swift packages (required by ExpoModulesJSI xcframework build)
        run: |
          # Resolve any standalone Swift packages inside expo-modules-core
          echo "=== expo-modules-core Package.swift files ==="
          find node_modules/expo-modules-core -name "Package.swift" -maxdepth 10 2>/dev/null \
            | head -10 || echo "None found"

          while IFS= read -r pkg; do
            dir="$(dirname "$pkg")"
            echo "→ swift package resolve: $dir"
            swift package resolve --package-path "$dir" 2>&1 | tail -3 || true
          done < <(find node_modules/expo-modules-core -name "Package.swift" -maxdepth 10 2>/dev/null)

          while IFS= read -r ws; do
            echo "→ xcodebuild resolve: $ws"
            xcodebuild -resolvePackageDependencies -workspace "$ws" \
              -derivedDataPath build/DerivedData 2>&1 | tail -3 || true
          done < <(find node_modules/expo-modules-core -name "*.xcworkspace" -maxdepth 10 2>/dev/null)

          # Resolve main workspace with exact same flags as the archive
          echo ""
          echo "=== Resolving main workspace (Release/iphoneos, shared DerivedData) ==="
          xcodebuild -resolvePackageDependencies \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            2>&1 | tee /tmp/resolve.log | tail -20
          echo "Done."

      - name: Archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SchoolMap.xcarchive \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SKIP_INSTALL=NO \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty || {
              echo ""
              echo "=== Archive failed — errors from build log ==="
              grep -E "(error:|PhaseScriptExecution)" /tmp/xcodebuild.log | tail -40 || true
              echo ""
              echo "=== Last 100 lines of raw xcodebuild log ==="
              tail -100 /tmp/xcodebuild.log
              exit 1
            }

          ls -la build/SchoolMap.xcarchive/Products/Applications/ 2>/dev/null \
            || (echo "Archive not created" && exit 1)

      - name: Package IPA
        run: |
          APP_PATH=$(find build/SchoolMap.xcarchive -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SchoolMap-unsigned.ipa Payload/
          echo "IPA size: $(du -sh SchoolMap-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SchoolMap-iOS-unsigned
          path: SchoolMap-unsigned.ipa
          retention-days: 7
