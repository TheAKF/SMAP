name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > /tmp/GoogleService-Info.plist

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy GoogleService-Info.plist into iOS project
        run: |
          find ios -name "*.xcodeproj" -maxdepth 2 | head -1 | xargs -I{} dirname {} | xargs -I{} cp /tmp/GoogleService-Info.plist {}/GoogleService-Info.plist

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | head -1 | xargs)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Found: workspace=$WORKSPACE scheme=$SCHEME"

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing 2>&1 | tail -50 || \
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -100

      - name: Package IPA
        run: |
          APP_PATH=$(find build -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          echo "App found at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SchoolMap-unsigned.ipa Payload/
          echo "IPA size: $(du -sh SchoolMap-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolMap-iOS-unsigned
          path: SchoolMap-unsigned.ipa
          retention-days: 7
