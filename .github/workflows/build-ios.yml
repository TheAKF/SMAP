name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > /tmp/GoogleService-Info.plist

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy GoogleService-Info.plist into iOS project
        run: |
          PROJ_DIR=$(find ios -name "*.xcodeproj" -maxdepth 2 | head -1 | xargs dirname)
          cp /tmp/GoogleService-Info.plist "$PROJ_DIR/GoogleService-Info.plist"
          echo "Copied to: $PROJ_DIR"

      - name: Patch Podfile — fix Firebase modular headers
        run: |
          python3 - <<'PYEOF'
          import re, sys

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          print("--- Podfile snippet before patch ---")
          for i, line in enumerate(content.splitlines()[:35], 1):
              print(f"{i}: {line}")

          patch = "  pod 'GoogleUtilities', :modular_headers => true\n" \
                  "  pod 'FirebaseCoreInternal', :modular_headers => true\n"

          if "pod 'GoogleUtilities', :modular_headers" in content:
              print("\n✅ Already patched")
          else:
              # Insert right after the first `target '...' do` line
              patched = re.sub(
                  r"(target '[^']+' do\n)",
                  r"\g<1>" + patch,
                  content,
                  count=1
              )
              if patched == content:
                  print("\n❌ target block not found — prepending use_modular_headers!")
                  patched = "use_modular_headers!\n" + content
              with open('ios/Podfile', 'w') as f:
                  f.write(patched)
              print("\n✅ Patched!")

          # Verify
          with open('ios/Podfile', 'r') as f:
              result = f.read()
          matches = [l for l in result.splitlines() if 'GoogleUtilities' in l or 'modular_headers' in l]
          print("\n--- Verification ---")
          print('\n'.join(matches) if matches else "❌ NOTHING FOUND")
          PYEOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE, scheme=$SCHEME"

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SchoolMap.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            | xcpretty || true

          # Verify archive was created
          ls -la build/SchoolMap.xcarchive/Products/Applications/ 2>/dev/null \
            || (echo "Archive failed, checking build log..." && exit 1)

      - name: Package IPA
        run: |
          APP_PATH=$(find build/SchoolMap.xcarchive -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SchoolMap-unsigned.ipa Payload/
          echo "IPA size: $(du -sh SchoolMap-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SchoolMap-iOS-unsigned
          path: SchoolMap-unsigned.ipa
          retention-days: 7
