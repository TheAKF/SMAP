name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Select latest Xcode
        run: |
          echo "=== Available Xcode installs ==="
          ls /Applications/ | grep -E '^Xcode' || true
          echo ""
          echo "Current default:"
          xcodebuild -version
          swift --version 2>/dev/null || true

          # expo-modules-jsi Package.swift requires swift-tools-version: 6.2.
          # Select the newest Xcode on this runner so we have the latest SwiftPM.
          LATEST=$(ls /Applications/ | grep -E '^Xcode_[0-9]' | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            echo "Selecting newest Xcode: $LATEST"
            sudo xcode-select -s "/Applications/${LATEST}/Contents/Developer"
          fi
          echo ""
          echo "=== Active Xcode after selection ==="
          xcodebuild -version
          swift --version 2>/dev/null || true

      - name: Write GoogleService-Info.plist
        run: |
          # Write to project root so @react-native-firebase/app plugin finds it during prebuild
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > GoogleService-Info.plist
          cp GoogleService-Info.plist /tmp/GoogleService-Info.plist

      - name: Create dummy google-services.json (iOS-only build, Android not needed)
        run: |
          cat > google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "920361704345",
              "project_id": "smap-f893f",
              "storage_bucket": "smap-f893f.firebasestorage.app"
            },
            "client": [],
            "configuration_version": "1"
          }
          EOF

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch AppDelegate - Firebase setup + explicit APNs forwarding
        run: |
          python3 << 'PYEOF'
          import os, re, sys

          # Find AppDelegate.swift
          path = None
          for root, dirs, files in os.walk('ios'):
              dirs[:] = [d for d in dirs if d != 'Pods']
              if 'AppDelegate.swift' in files:
                  path = os.path.join(root, 'AppDelegate.swift')
                  break

          if not path:
              print("ERROR: AppDelegate.swift not found!")
              sys.exit(1)

          print(f"Found: {path}")
          with open(path) as f:
              src = f.read()

          print("=== BEFORE ===")
          print(src)
          out = src

          # 1. Add 'import Firebase' after first import line if missing
          if 'import Firebase' not in out:
              out = re.sub(r'^(import \S+)', r'\1\nimport Firebase', out, count=1, flags=re.MULTILINE)
              print("+ Added: import Firebase")

          # 2. Move FirebaseApp.configure() to BEFORE startReactNative call.
          # RNFB native modules register during startReactNative and immediately
          # access [FIRAuth auth] — if Firebase isn't configured yet, it crashes.
          # Remove any existing configure() call first, then insert before startReactNative.
          out = re.sub(r'\n[ \t]*FirebaseApp\.configure\(\)[ \t]*\n?', '\n', out)
          # Insert right before the startReactNative / factory.startReactNative call
          if 'FirebaseApp.configure()' not in out:
              out = re.sub(
                  r'([ \t]*(?:factory\.startReactNative|startReactNative)\b)',
                  r'    FirebaseApp.configure()\n\1',
                  out, count=1
              )
              if 'FirebaseApp.configure()' in out:
                  print("+ Added: FirebaseApp.configure() BEFORE startReactNative")
              else:
                  # Fallback: insert at top of didFinishLaunchingWithOptions body
                  out = re.sub(
                      r'(didFinishLaunchingWithOptions[^\{]*\{)',
                      r'\1\n    FirebaseApp.configure()',
                      out, count=1
                  )
                  print("+ Added: FirebaseApp.configure() (fallback position)")
          else:
              print("= FirebaseApp.configure() already in correct position")

          # 3. Add explicit APNs forwarding methods (required because
          #    FirebaseAppDelegateProxyEnabled=NO disables swizzling,
          #    and ExpoAppDelegate's new-arch method dispatch blocks swizzling anyway)
          if 'setAPNSToken' not in out:
              L = [
                  '',
                  '  // Firebase phone auth - explicit APNs forwarding (swizzling disabled)',
                  '  func application(_ application: UIApplication,',
                  '    didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {',
                  '    Auth.auth().setAPNSToken(deviceToken, type: .unknown)',
                  '  }',
                  '  func application(_ application: UIApplication,',
                  '    didFailToRegisterForRemoteNotificationsWithError error: Error) {',
                  '    // Firebase falls back to reCAPTCHA automatically',
                  '  }',
                  '  func application(_ application: UIApplication,',
                  '    didReceiveRemoteNotification userInfo: [AnyHashable: Any],',
                  '    fetchCompletionHandler ch: @escaping (UIBackgroundFetchResult) -> Void) {',
                  '    if Auth.auth().canHandleNotification(userInfo) { ch(.noData); return }',
                  '    ch(.noData)',
                  '  }',
                  '',
              ]
              apns_methods = '\n'.join(L)
              last_brace = out.rfind('}')
              out = out[:last_brace] + apns_methods + '\n' + out[last_brace:]
              print("+ Added: APNs forwarding methods")

          with open(path, 'w') as f:
              f.write(out)

          print("=== AFTER ===")
          print(out)
          PYEOF

      - name: Copy GoogleService-Info.plist into iOS project
        run: |
          PROJ_DIR=$(find ios -name "*.xcodeproj" -maxdepth 2 | head -1 | xargs dirname)
          cp /tmp/GoogleService-Info.plist "$PROJ_DIR/GoogleService-Info.plist"
          echo "Copied to: $PROJ_DIR"

      - name: Patch Podfile - fix Firebase modular headers
        run: |
          python3 << 'PYEOF'
          import re

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          # -- Diagnostic ------------------------------------------------------
          print('=== Podfile first 30 lines ===')
          for i, line in enumerate(content.splitlines()[:30], 1):
              print(f'{i:3}: {line}')
          print()

          idx = content.find('use_expo_modules!')
          if idx >= 0:
              end_idx = content.find('\n', idx)
              print(f'use_expo_modules! found at char {idx}')
              print(f'  exact line : {repr(content[idx:end_idx])}')
              print(f'  with prefix: {repr(content[max(0,idx-10):end_idx])}')
          else:
              print('WARNING: use_expo_modules! NOT FOUND in Podfile!')
          print()

          # -- Fix 1: REMOVED - global use_modular_headers! causes RNFBAuth to go
          # through Xcode's ScanDependencies phase, which fails because
          # FirebaseAuth-Swift.h doesn't exist yet at scan time (it's generated
          # during FirebaseAuth Swift compilation, which hasn't run yet).
          # Per-pod overrides in Fix 3 are sufficient.
          print('= Fix 1: skipped (use_modular_headers! global intentionally omitted)')

          # -- Fix 2: exclude EXFirebaseCore using direct string position -------
          # EXFirebaseCore pulls in FirebaseCoreInternal -> GoogleUtilities (the broken chain)
          if 'EXFirebaseCore' not in content:
              idx = content.find('use_expo_modules!')
              if idx >= 0:
                  eol = content.find('\n', idx)
                  original_line = content[idx:eol]
                  suffix = original_line[len('use_expo_modules!'):]
                  # Accept empty, whitespace-only, or empty-parens suffix
                  if not suffix.strip() or suffix.strip() == '()':
                      new_line = 'use_expo_modules!(exclude: ["EXFirebaseCore"])'
                      content = content[:idx] + new_line + content[eol:]
                      print(f'+ Fix 2: patched use_expo_modules! -> excluded EXFirebaseCore')
                  else:
                      print(f'! Fix 2: unexpected suffix {repr(suffix)} - skipping (Fix 3 will handle it)')
              else:
                  print('! Fix 2: use_expo_modules! not found')
          else:
              print('= Fix 2: EXFirebaseCore already excluded')

          # -- Fix 3: explicit pod overrides (inserted right after use_expo_modules!) --
          POD_PATCH = (
              "  pod 'GoogleUtilities', :modular_headers => true\n"
              "  pod 'FirebaseCoreInternal', :modular_headers => true\n"
              "  pod 'FirebaseCore', :modular_headers => true\n"
              "  pod 'FirebaseAuth', :modular_headers => true\n"
              "  pod 'FirebaseAuthInterop', :modular_headers => true\n"
          )
          if "pod 'FirebaseAuth', :modular_headers" not in content:
              idx = content.find('use_expo_modules!')
              if idx >= 0:
                  eol = content.find('\n', idx) + 1   # position right after the newline
                  content = content[:eol] + POD_PATCH + content[eol:]
                  print('+ Fix 3: inserted Firebase pod modular_headers overrides')
              else:
                  # Fallback: insert inside first target block
                  content = re.sub(
                      r"(target '[^']+' do\n)",
                      r'\1' + POD_PATCH,
                      content, count=1
                  )
                  print('+ Fix 3: inserted pod overrides inside target block (fallback)')
          else:
              print('= Fix 3: pod overrides already present')

          with open('ios/Podfile', 'w') as f:
              f.write(content)

          print()
          print('=== Key lines after patch ===')
          for i, line in enumerate(content.splitlines(), 1):
              if any(k in line for k in ['modular_headers', 'EXFirebaseCore', 'GoogleUtilities',
                                          'FirebaseCore', 'FirebaseAuth',
                                          'use_expo_modules', 'platform :ios']):
                  print(f'{i:3}: {line}')
          print()
          print('=== Podfile first 50 lines ===')
          for i, line in enumerate(content.splitlines()[:50], 1):
              print(f'{i:3}: {line}')
          PYEOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Show GoogleService-Info.plist keys (debug)
        run: |
          python3 << 'PYEOF'
          import plistlib
          try:
              with open('GoogleService-Info.plist', 'rb') as f:
                  gsi = plistlib.load(f)
              print("Keys in GoogleService-Info.plist:")
              for k, v in gsi.items():
                  print(f"  {k}: {v}")
          except Exception as e:
              print(f"Error: {e}")
              # Try XML mode
              with open('GoogleService-Info.plist') as f:
                  print("Raw content (first 500 chars):", f.read(500))
          PYEOF

      - name: Create stub FirebaseAuth-Swift.h for ScanDependencies
        run: |
          # Xcode's explicit-modules ScanDependencies phase runs BEFORE compilation.
          # FirebaseAuth-Swift.h is generated DURING FirebaseAuth Swift compilation.
          # If Xcode scans RNFBAuth first, it fails: Firebase.h -> FirebaseAuth-Swift.h not found.
          # A stub header in the CocoaPods public-headers directory satisfies the scan.
          # The real generated header (in DerivedData) is used during actual compilation.
          HEADERS_DIR="ios/Pods/Headers/Public/FirebaseAuth"
          mkdir -p "$HEADERS_DIR"
          if [ ! -f "$HEADERS_DIR/FirebaseAuth-Swift.h" ]; then
            echo "// Stub - real header generated by Xcode during FirebaseAuth Swift build" \
              > "$HEADERS_DIR/FirebaseAuth-Swift.h"
            echo "Created stub at $HEADERS_DIR/FirebaseAuth-Swift.h"
          else
            echo "FirebaseAuth-Swift.h already exists (unexpected)"
          fi

      - name: Fix ExpoModulesJSI xcframework build
        run: |
          set -e
          EXPO_JSI_PKG="$(pwd)/node_modules/expo-modules-jsi/apple"
          BUILD_SCRIPT="${EXPO_JSI_PKG}/scripts/build-xcframework.sh"
          PODS_ROOT="$(pwd)/ios/Pods"

          # -- Why this step exists ---------------------------------------------
          # build-xcframework.sh runs an inner `xcodebuild` with two key settings:
          #   1. -derivedDataPath "${PACKAGE_DIR}/.DerivedData"  (its own separate cache,
          #      NOT our build/DerivedData)
          #   2. -disableAutomaticPackageResolution  (refuses to resolve if .DerivedData
          #      doesn't already exist)
          # On a fresh CI run that .DerivedData/ is empty -> xcodebuild errors with
          # "Could not resolve package dependencies". Package.swift has dependencies: []
          # so resolution is instant/no-network; removing the flag is safe.

          echo "=== Patch: remove -disableAutomaticPackageResolution ==="
          # Allow the inner xcodebuild to do a trivial first-time resolution
          # (ExpoModulesJSI/Package.swift has zero external dependencies).
          sed -i '' 's/ -disableAutomaticPackageResolution//' "$BUILD_SCRIPT"
          echo "Verify flag is gone:"
          grep -n "disableAutomatic" "$BUILD_SCRIPT" \
            && echo "WARNING: flag still present!" \
            || echo "  OK - flag removed."

          echo ""
          echo "=== Generate ExpoModulesJSI module map ==="
          # build-xcframework.sh calls generate-modulemap.sh itself, but running
          # it now also validates that PODS_ROOT is correct before the archive.
          PODS_ROOT="$PODS_ROOT" \
            bash "${EXPO_JSI_PKG}/scripts/generate-modulemap.sh"
          echo "Module map: ${EXPO_JSI_PKG}/.generated/module.modulemap"
          cat "${EXPO_JSI_PKG}/.generated/module.modulemap" || true

          echo ""
          echo "=== Pre-resolve ExpoModulesJSI package into its own .DerivedData ==="
          # This pre-populates .DerivedData/SourcePackages/ so the (now un-flagged)
          # inner xcodebuild finds a valid resolved state immediately.
          (cd "$EXPO_JSI_PKG" && \
            PODS_ROOT="$PODS_ROOT" \
            xcodebuild -resolvePackageDependencies \
              -scheme ExpoModulesJSI \
              -derivedDataPath .DerivedData \
              2>&1 | tail -20
          ) || echo "Note: pre-resolve returned non-zero (may be OK if no external deps)"

          echo "SourcePackages created:"
          ls -la "${EXPO_JSI_PKG}/.DerivedData/" 2>/dev/null \
            || echo "  (directory not created - that's OK, patch alone may be enough)"

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          echo "Workspace: $WORKSPACE"

          # List all available schemes for debugging
          echo "Available schemes:"
          xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | grep -A 999 "Schemes:" || true

          # Prefer the app scheme (SchoolMap) over pod schemes like EXAV, RNScreens, etc.
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" \
            | xargs -I{} echo "{}" \
            | grep -i "^SchoolMap$" | head -1)

          # Fallback: any scheme with "School" in the name
          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
              | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" \
              | grep -i "School" | head -1 | xargs)
          fi

          # Last resort: first scheme
          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
              | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          fi

          echo "Selected scheme: $SCHEME"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Pre-resolve main workspace Swift packages
        run: |
          echo "=== Resolving main workspace (Release/iphoneos) ==="
          xcodebuild -resolvePackageDependencies \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            2>&1 | tee /tmp/resolve.log | tail -20
          echo "Done."

      - name: Archive (unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SchoolMap.xcarchive \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SKIP_INSTALL=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.4 \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty || {
              echo ""
              echo "=== Archive failed - errors from build log ==="
              grep -E "(error:|PhaseScriptExecution)" /tmp/xcodebuild.log | tail -40 || true
              echo ""
              echo "=== Last 100 lines of raw xcodebuild log ==="
              tail -100 /tmp/xcodebuild.log
              exit 1
            }

          ls -la build/SchoolMap.xcarchive/Products/Applications/ 2>/dev/null \
            || (echo "Archive not created" && exit 1)

      - name: Package IPA
        run: |
          APP_PATH=$(find build/SchoolMap.xcarchive -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SchoolMap-unsigned.ipa Payload/
          echo "IPA size: $(du -sh SchoolMap-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SchoolMap-iOS-unsigned
          path: SchoolMap-unsigned.ipa
          retention-days: 7
