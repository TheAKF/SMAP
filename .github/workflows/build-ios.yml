name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > /tmp/GoogleService-Info.plist

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy GoogleService-Info.plist into iOS project
        run: |
          PROJ_DIR=$(find ios -name "*.xcodeproj" -maxdepth 2 | head -1 | xargs dirname)
          cp /tmp/GoogleService-Info.plist "$PROJ_DIR/GoogleService-Info.plist"
          echo "Copied to: $PROJ_DIR"

      - name: Show Podfile BEFORE patch
        run: |
          echo "=== ios/Podfile first 40 lines (BEFORE patch) ==="
          head -40 ios/Podfile

      - name: Patch Podfile — fix Firebase modular headers
        run: |
          python3 << 'PYEOF'
          import re

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          # ── Fix 1: use_modular_headers! globally ──────────────────────────────
          if 'use_modular_headers!' not in content:
              m = re.search(r'platform :ios[^\n]*\n', content)
              pos = m.end() if m else 0
              content = content[:pos] + 'use_modular_headers!\n' + content[pos:]
              print('+ Fix 1: added use_modular_headers! globally')
          else:
              print('= Fix 1: use_modular_headers! already present')

          # ── Fix 2: explicit pod overrides after use_expo_modules! ─────────────
          POD_PATCH = (
              "  pod 'GoogleUtilities', :modular_headers => true\n"
              "  pod 'FirebaseCoreInternal', :modular_headers => true\n"
          )
          if "pod 'GoogleUtilities'" not in content:
              # Insert after use_expo_modules! (with optional arguments)
              patched = re.sub(
                  r'([ \t]*use_expo_modules!(?:\([^)]*\))?\n)',
                  r'\1' + POD_PATCH,
                  content
              )
              if patched != content:
                  content = patched
                  print('+ Fix 2: added GoogleUtilities/FirebaseCoreInternal overrides after use_expo_modules!')
              else:
                  print('! Fix 2: use_expo_modules! not found — inserting in first target block')
                  content = re.sub(
                      r"(target '[^']+' do\n)",
                      r'\1' + POD_PATCH,
                      content,
                      count=1
                  )
          else:
              print('= Fix 2: GoogleUtilities pod override already present')

          with open('ios/Podfile', 'w') as f:
              f.write(content)

          print('\n=== Podfile AFTER patch (first 50 lines) ===')
          for i, line in enumerate(content.splitlines()[:50], 1):
              print(f'{i:3}: {line}')
          PYEOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE, scheme=$SCHEME"

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SchoolMap.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            | xcpretty || true

          ls -la build/SchoolMap.xcarchive/Products/Applications/ 2>/dev/null \
            || (echo "Archive failed" && exit 1)

      - name: Package IPA
        run: |
          APP_PATH=$(find build/SchoolMap.xcarchive -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SchoolMap-unsigned.ipa Payload/
          echo "IPA size: $(du -sh SchoolMap-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SchoolMap-iOS-unsigned
          path: SchoolMap-unsigned.ipa
          retention-days: 7
