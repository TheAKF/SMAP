name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > /tmp/GoogleService-Info.plist

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy GoogleService-Info.plist into iOS project
        run: |
          PROJ_DIR=$(find ios -name "*.xcodeproj" -maxdepth 2 | head -1 | xargs dirname)
          cp /tmp/GoogleService-Info.plist "$PROJ_DIR/GoogleService-Info.plist"
          echo "Copied to: $PROJ_DIR"

      - name: Patch Podfile — fix Firebase modular headers
        run: |
          python3 << 'PYEOF'
          import re

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          print('=== Podfile BEFORE patch (first 30 lines) ===')
          for i, line in enumerate(content.splitlines()[:30], 1):
              print(f'{i:3}: {line}')
          print()

          # ── Fix 1: use_modular_headers! globally ──────────────────────────────
          if 'use_modular_headers!' not in content:
              m = re.search(r'^platform :ios', content, re.MULTILINE)
              if m:
                  pos = content.index('\n', m.start()) + 1
                  content = content[:pos] + 'use_modular_headers!\n' + content[pos:]
              else:
                  content = 'use_modular_headers!\n' + content
              print('+ Fix 1: added use_modular_headers!')
          else:
              print('= Fix 1: use_modular_headers! already present')

          # ── Fix 2: exclude EXFirebaseCore from use_expo_modules! ─────────────
          # EXFirebaseCore pulls in FirebaseCoreInternal (Swift) → GoogleUtilities (ObjC)
          # which is exactly what causes the "does not define modules" error.
          if 'EXFirebaseCore' not in content:
              new_content = re.sub(
                  r'([ \t]*use_expo_modules!)(\s*\n)',
                  r'\1(exclude: ["EXFirebaseCore"])\2',
                  content, count=1
              )
              if 'EXFirebaseCore' in new_content:
                  content = new_content
                  print('+ Fix 2: excluded EXFirebaseCore from use_expo_modules!')
              else:
                  print('! Fix 2: FAILED to find use_expo_modules! — dumping matching lines:')
                  for line in content.splitlines():
                      if 'expo_modules' in line or 'use_expo' in line:
                          print(f'  {repr(line)}')
          else:
              print('= Fix 2: EXFirebaseCore already excluded')

          # ── Fix 3: belt-and-suspenders — explicit pod overrides ──────────────
          # Forces GoogleUtilities to define modules even if it somehow slips through.
          if "pod 'GoogleUtilities'" not in content:
              new_content = re.sub(
                  r'([ \t]*use_expo_modules!(?:\([^)]*\))?\s*\n)',
                  lambda m: m.group(0)
                      + "  pod 'GoogleUtilities', :modular_headers => true\n"
                      + "  pod 'FirebaseCoreInternal', :modular_headers => true\n",
                  content, count=1
              )
              if "pod 'GoogleUtilities'" in new_content:
                  content = new_content
                  print('+ Fix 3: added GoogleUtilities/FirebaseCoreInternal pod overrides')
              else:
                  print('! Fix 3: could not add pod overrides — use_expo_modules! not found')
          else:
              print('= Fix 3: GoogleUtilities pod override already present')

          with open('ios/Podfile', 'w') as f:
              f.write(content)

          print()
          print('=== Key lines in patched Podfile ===')
          for i, line in enumerate(content.splitlines(), 1):
              if any(k in line for k in ['modular_headers', 'EXFirebaseCore', 'GoogleUtilities', 'use_expo_modules', 'platform :ios']):
                  print(f'{i:3}: {line}')

          print()
          print('=== Podfile AFTER patch (first 50 lines) ===')
          for i, line in enumerate(content.splitlines()[:50], 1):
              print(f'{i:3}: {line}')
          PYEOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE, scheme=$SCHEME"

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SchoolMap.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            | xcpretty || true

          ls -la build/SchoolMap.xcarchive/Products/Applications/ 2>/dev/null \
            || (echo "Archive failed" && exit 1)

      - name: Package IPA
        run: |
          APP_PATH=$(find build/SchoolMap.xcarchive -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r SchoolMap-unsigned.ipa Payload/
          echo "IPA size: $(du -sh SchoolMap-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SchoolMap-iOS-unsigned
          path: SchoolMap-unsigned.ipa
          retention-days: 7
